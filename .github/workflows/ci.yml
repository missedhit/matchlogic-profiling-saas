name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        working-directory: backend
        run: dotnet restore MatchLogicWebApi.sln
      - name: Build (API only — test projects deferred to SaaS-specific suite)
        working-directory: backend
        run: dotnet build src/MatchLogic.Api/MatchLogic.Api.csproj --no-restore --configuration Release

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build (static export)
        working-directory: frontend
        run: npm run build

name: Backend Deploy

# Triggered on every push to main that touches backend/. Builds the Docker
# image and pushes to ECR with two tags: `latest` and `sha-<git-sha>`.
# ECS Fargate service-update step lands in M1d step 5.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

# Prevent concurrent deploys clobbering each other (a slow build for an old
# commit shouldn't overwrite a faster build for a newer commit).
concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: matchlogic-profiling-saas/api
  ECS_CLUSTER: profiler-saas-dev
  ECS_SERVICE: profiler-saas-dev-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/src/MatchLogic.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # GitHub Actions cache speeds repeat builds (the NuGet restore layer
          # and the SDK base image rarely change).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Echo pushed image URIs
        run: |
          echo "Image pushed:"
          echo "  ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}"
          echo "  ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"

      # The task definition references the :latest tag, so pulling a fresh
      # image requires forcing ECS to start a new task (it doesn't auto-poll
      # ECR). --force-new-deployment is the simplest way; ECS spins up the
      # new task, waits for ALB target-group health, then drains the old.
      - name: Force ECS service redeploy
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --no-cli-pager > /dev/null
          echo "Triggered redeploy of $ECS_SERVICE on $ECS_CLUSTER."

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE"
          echo "Service is stable — new task is healthy and old task drained."

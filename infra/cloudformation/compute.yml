AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MatchLogic Profiling SaaS — VPC, public subnets, ECS Fargate cluster +
  service, ALB. M1d steps 4+5 scope. Bundled in one stack because the
  network and compute resources are tightly coupled and only one
  environment exists for now (dev). HTTPS listener + cert wiring lands
  in step 6 (edge.yml). No NAT — Fargate tasks live in public subnets
  with public IPs assigned (cost optimization, dev-only posture).

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev

  EcrRepositoryUri:
    Type: String
    Description: Full image URI to deploy. Defaults to the dev :latest tag.
    Default: 274020917421.dkr.ecr.us-east-1.amazonaws.com/matchlogic-profiling-saas/api:latest

  TaskCpu:
    Type: String
    Default: "512"
    Description: Fargate CPU units (256/512/1024/2048/4096). 512 = 0.5 vCPU.

  TaskMemory:
    Type: String
    Default: "1024"
    Description: Fargate memory in MiB. Must match a valid CPU/memory pair
                 (see ECS docs).

  DesiredCount:
    Type: Number
    Default: 1
    Description: How many Fargate tasks to keep running. Set to 0 to pause
                 (ALB stays up; Fargate billing stops).

  SsmParameterPrefix:
    Type: String
    Default: /profiler-saas/dev
    Description: SSM Parameter Store path prefix where the Cognito + Mongo
                 SecureStrings live (created in step 3).

Resources:

  # ---------------------------------------------------------------------
  # Network — VPC with two public subnets across two AZs (ALB requires
  # at least two subnets in different AZs). No private subnets / NAT for
  # the dev posture; Fargate tasks get public IPs and use the Atlas
  # allowlist directly.
  # ---------------------------------------------------------------------

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-igw"

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-public-b"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-public-rt"

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # ---------------------------------------------------------------------
  # Security groups — ALB takes 80/443 from the world; ECS takes 8080
  # only from the ALB.
  # ---------------------------------------------------------------------

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public ingress to the ALB.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS from anywhere (used after step 6)
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-alb-sg"

  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: API container; only the ALB may reach 8080.
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "profiler-saas-${Environment}-ecs-sg"

  EcsSgIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: API port from the ALB only.

  # ---------------------------------------------------------------------
  # ALB — public-facing, listens on 80, forwards to the ECS target group.
  # Listener on 443 added in step 6 once the ACM cert is issued.
  # ---------------------------------------------------------------------

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "profiler-saas-${Environment}-alb"
      Scheme: internet-facing
      Type: application
      IpAddressType: ipv4
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "profiler-saas-${Environment}-tg"
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref Vpc
      TargetType: ip
      HealthCheckPath: /api/HealthCheck/
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ---------------------------------------------------------------------
  # ECS — cluster, log group, task execution role, task definition,
  # service.
  # ---------------------------------------------------------------------

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "profiler-saas-${Environment}"
      ClusterSettings:
        - Name: containerInsights
          Value: disabled

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/profiler-saas-${Environment}/api"
      RetentionInDays: 14

  # Pulls the image, reads SSM parameters, writes logs.
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReadSsmParameters
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"

  # The role the running container assumes. Empty for now — all AWS-side
  # access (Cognito JWKS fetch, etc.) happens via public endpoints. M2 will
  # add S3 permissions here for the file upload bucket.
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "profiler-saas-${Environment}-api"
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Ref EcrRepositoryUri
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: ASPNETCORE_ENVIRONMENT
              Value: Production
            - Name: ASPNETCORE_URLS
              Value: http://+:8080
          Secrets:
            - Name: Cognito__Region
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/cognito/region"
            - Name: Cognito__UserPoolId
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/cognito/user-pool-id"
            - Name: Cognito__ClientId
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/cognito/client-id"
            - Name: MongoDB__ConnectionString
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/mongodb/connection-string"
            - Name: MongoDB__DatabaseName
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/mongodb/database-name"
            - Name: MongoDB__Progress__ConnectionString
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/mongodb/progress-connection-string"
            - Name: MongoDB__Progress__DatabaseName
              ValueFrom: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${SsmParameterPrefix}/mongodb/progress-database-name"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api

  Service:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: !Sub "profiler-saas-${Environment}-api"
      Cluster: !Ref Cluster
      TaskDefinition: !Ref TaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnetA
            - !Ref PublicSubnetB
          SecurityGroups:
            - !Ref EcsSecurityGroup
      LoadBalancers:
        - ContainerName: api
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 60
      EnableExecuteCommand: true

Outputs:

  AlbDnsName:
    Description: ALB public DNS name. Hit /api/HealthCheck/ here to verify.
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-AlbDnsName"

  AlbHostedZoneId:
    Description: ALB hosted zone ID. Needed for Route 53 alias records (step 7).
    Value: !GetAtt LoadBalancer.CanonicalHostedZoneID
    Export:
      Name: !Sub "${AWS::StackName}-AlbHostedZoneId"

  AlbArn:
    Description: ALB ARN. Listener-443 (step 6) attaches here.
    Value: !Ref LoadBalancer
    Export:
      Name: !Sub "${AWS::StackName}-AlbArn"

  ClusterName:
    Description: ECS cluster name.
    Value: !Ref Cluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ServiceName:
    Description: ECS service name. Used by `aws ecs update-service
                 --force-new-deployment` after a fresh image push.
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub "${AWS::StackName}-ServiceName"

  VpcId:
    Description: VPC ID. M2 (S3 VPC endpoint) and M4 (ElastiCache) will
                 attach here.
    Value: !Ref Vpc
    Export:
      Name: !Sub "${AWS::StackName}-VpcId"

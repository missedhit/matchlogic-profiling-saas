AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MatchLogic Profiling SaaS — ECR private repository for the backend API
  container image. M1d step 2 scope. The GitHub Actions workflow builds the
  image and pushes here on every commit to main; ECS Fargate (M1d step 5)
  pulls from here.

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, prod]
    Default: dev
    Description: Environment suffix used in resource names.

  RepositoryName:
    Type: String
    Default: matchlogic-profiling-saas/api
    Description: ECR repository name. Mirrors the GitHub repo path so the URI
                 is self-documenting.

Resources:
  Repository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Ref RepositoryName
      # MUTABLE so the workflow can move the floating :latest tag on each
      # deploy. SHA-tagged images get re-pushed only on workflow re-runs of
      # the same commit (a no-op semantically since the git SHA is itself
      # immutable). For audit-grade immutability, switch to IMMUTABLE here
      # and have the workflow render a new task-def revision per SHA
      # instead of redeploying :latest.
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        # Keep cost bounded on a free-tier project: drop untagged layers fast,
        # cap the number of retained tagged images. The "latest" tag floats
        # and is overwritten — only SHA-tagged images actually accumulate.
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images after 14 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 14
                },
                "action": { "type": "expire" }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 10 SHA-tagged images",
                "selection": {
                  "tagStatus": "tagged",
                  "tagPatternList": ["sha-*"],
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }
      Tags:
        - Key: Project
          Value: profiler-saas
        - Key: Environment
          Value: !Ref Environment

Outputs:
  RepositoryUri:
    Description: ECR repository URI — used by GitHub Actions and by the ECS
                 task definition image field.
    Value: !GetAtt Repository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryUri"

  RepositoryArn:
    Description: ECR repository ARN — used to scope the IAM policy of the
                 GitHub Actions push user.
    Value: !GetAtt Repository.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryArn"

  RepositoryName:
    Description: ECR repository name (without the registry host prefix).
    Value: !Ref Repository
    Export:
      Name: !Sub "${AWS::StackName}-RepositoryName"

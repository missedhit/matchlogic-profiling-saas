  <!-- Edge: top to bottom-right -->
  <line x1="14" y1="6.5" x2="17" y2="15.5" stroke="#008CC1" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Edge: bottom-left to bottom-right -->
